<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' file:; media-src 'self' file:; style-src 'self' 'unsafe-inline';" />
  <title>Focus Guard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="overlay">
    <img id="reminder-image" src="" alt="" />
    <div id="content">
      <div id="top-badge">FOCUS GUARD</div>
      <p id="reminder-message"></p>
      <div id="countdown-wrap">
        <div id="countdown-ring">
          <svg viewBox="0 0 56 56">
            <circle class="track" cx="28" cy="28" r="24" />
            <circle id="progress-circle" class="progress" cx="28" cy="28" r="24" />
          </svg>
          <span id="countdown-num"></span>
        </div>
        <p id="countdown-label">Please reflect for a moment...</p>
      </div>
      <div id="buttons" class="hidden">
        <button id="btn-go-back">Go Back</button>
        <button id="btn-aware">I'm Aware</button>
      </div>
    </div>
  </div>
  <audio id="reminder-audio" preload="auto"></audio>
  <script src="app.js"></script>
</body>
</html>
